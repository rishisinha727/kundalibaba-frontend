<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">

  <!-- Deep navy background -->
  <rect width="64" height="64" rx="12" fill="#0D1B3E"/>

  <!-- Decorative outer ring — kesariya saffron -->
  <circle cx="32" cy="32" r="29" stroke="#FF6600" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!--
    Hindu Swastika (卐) — clockwise (Vedic tradition)
    Center 32,32 | Arm width 10 | Arm reach 19 | Hook 14
    Top hook → RIGHT | Right hook → DOWN | Bottom hook → LEFT | Left hook → UP
  -->
  <path d="
    M 27,13 L 37,13
    L 37,27 L 51,27
    L 51,37 L 37,37
    L 37,51 L 27,51
    L 27,37 L 13,37
    L 13,27 L 27,27
    Z"
    fill="#FF6600"
  />

  <!-- Traditional four quadrant dots (Hindu mythology — Shubh Labh) -->
  <circle cx="20" cy="20" r="2.8" fill="#FFB300"/>
  <circle cx="44" cy="20" r="2.8" fill="#FFB300"/>
  <circle cx="44" cy="44" r="2.8" fill="#FFB300"/>
  <circle cx="20" cy="44" r="2.8" fill="#FFB300"/>

  <!-- Cardinal ring dots — golden -->
  <circle cx="32" cy="3"  r="1.8" fill="#FFB300"/>
  <circle cx="32" cy="61" r="1.8" fill="#FFB300"/>
  <circle cx="3"  cy="32" r="1.8" fill="#FFB300"/>
  <circle cx="61" cy="32" r="1.8" fill="#FFB300"/>

</svg>
