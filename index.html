<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kundalibaba — AI-Powered Vedic Astrology</title>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q3NVWFP2W0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q3NVWFP2W0');

  <style>
    @font-face {
      font-family: 'Playfair Display';
      src: url('KundaliBaba_extracted/fonts/PlayfairDisplay-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Playfair Display';
      src: url('KundaliBaba_extracted/fonts/PlayfairDisplay-Medium.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Playfair Display';
      src: url('KundaliBaba_extracted/fonts/PlayfairDisplay-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'Playfair Display';
      src: url('KundaliBaba_extracted/fonts/PlayfairDisplay-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Playfair Display';
      src: url('KundaliBaba_extracted/fonts/PlayfairDisplay-ExtraBold.ttf') format('truetype');
      font-weight: 800;
      font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      padding: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFF9F0;
      -webkit-font-smoothing: antialiased;
    }

</head>
<body>
  <div id="root"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- API layer (plain JS, no Babel needed) -->
  <script src="KundaliBaba_extracted/api.js"></script>

  <!-- Design system: tweaks panel, shared components, pages -->
  <script type="text/babel" src="KundaliBaba_extracted/tweaks-panel.jsx?v=11"></script>
  <script type="text/babel" src="KundaliBaba_extracted/Components.jsx?v=13"></script>
  <script type="text/babel">
// ============================================================
// KundaliBaba — Auth Modal (Google Login) — inlined to bypass CDN cache
// ============================================================
const GOOGLE_CLIENT_ID = '112774249048-rfnms6tnvqi4d6gcaureisbqfd2jb7de.apps.googleusercontent.com';

function AuthModal({ onClose, onSuccess }) {
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [status, setStatus] = React.useState('loading');
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    window.__kbGoogleCallback = async (response) => {
      setLoading(true); setError('');
      try {
        const res = await KBApi.googleLogin(response.credential);
        Auth.setToken(res.data.accessToken);
        Auth.setRefresh(res.data.refreshToken);
        Auth.setUser(res.data.user);
        onSuccess(res.data.user);
        onClose();
      } catch (e) {
        setError(e.message);
        setLoading(false);
      }
    };
    let attempts = 0;
    const tryRender = () => {
      attempts++;
      if (containerRef.current && window.google && window.google.accounts && window.google.accounts.id) {
        try {
          window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: window.__kbGoogleCallback });
          window.google.accounts.id.renderButton(containerRef.current, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 328 });
          setStatus('ready');
        } catch(e) {
          setStatus('error'); setError('Google Sign-In failed to load. Please refresh.');
        }
      } else if (attempts < 40) {
        setTimeout(tryRender, 250);
      } else {
        setStatus('error'); setError('Google Sign-In could not load. Please refresh the page.');
      }
    };
    const t = setTimeout(tryRender, 400);
    return () => { clearTimeout(t); delete window.__kbGoogleCallback; };
  }, []);

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(6,13,32,0.75)', zIndex:1000, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:'white', borderRadius:20, padding:36, width:'100%', maxWidth:400, boxShadow:'0 24px 64px rgba(13,27,62,0.2)', position:'relative' }}>
        <button onClick={onClose} style={{ position:'absolute', top:14, right:18, background:'none', border:'none', fontSize:22, cursor:'pointer', color:'#A07850', lineHeight:1 }}>×</button>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:32, marginBottom:8 }}>🔮</div>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:24, fontWeight:700, color:'#0D1B3E', margin:'0 0 6px' }}>Login to KundaliBaba</h2>
          <p style={{ fontSize:13, color:'#A07850', margin:0 }}>Sign in with Google to continue</p>
        </div>
        {loading && <div style={{ textAlign:'center', fontSize:14, color:'#A07850', marginBottom:16 }}>Signing in...</div>}
        {error && <div style={{ fontSize:13, color:'#C62828', background:'rgba(198,40,40,0.07)', padding:'10px 14px', borderRadius:8, marginBottom:16, textAlign:'center' }}>{error}</div>}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:16 }}>
          {status === 'loading' && (
            <div style={{ width:328, height:44, border:'1px solid #dadce0', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#A07850', gap:8 }}>
              Loading Google Sign-In...
            </div>
          )}
          <div ref={containerRef} style={{ width:328, minHeight: status === 'loading' ? 0 : 44 }} />
        </div>
        <div style={{ textAlign:'center', fontSize:12, color:'#A07850', marginTop:8 }}>By continuing, you agree to our Terms &amp; Privacy Policy</div>
      </div>
    </div>
  );
}
Object.assign(window, { AuthModal });
  </script>
  <script type="text/babel" src="KundaliBaba_extracted/LandingPage.jsx?v=14"></script>
  <script type="text/babel" src="KundaliBaba_extracted/HomePage.jsx?v=12"></script>
  <script type="text/babel" src="KundaliBaba_extracted/ChatPage.jsx?v=12"></script>
  <script type="text/babel" src="KundaliBaba_extracted/KundaliPage.jsx?v=12"></script>
  <script type="text/babel" src="KundaliBaba_extracted/ShopPage.jsx?v=12"></script>
  <script type="text/babel" src="KundaliBaba_extracted/HoroscopePage.jsx?v=12"></script>
  <script type="text/babel" src="KundaliBaba_extracted/CalculatorsPage.jsx?v=1"></script>

  <!-- App shell -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = { "heroSize": 54, "darkNav": false };

    const PAGE_TO_URL = {
      home:     '/',
      kundali:  '/free-kundali-online',
      matching: '/kundali-matching-online',
      chat:     '/chat-with-astrologer',
      shop:     '/shop',
      horoscope: '/horoscope',
    };

    const URL_TO_PAGE = {
      '':                        'home',
      'free-kundali-online':     'kundali',
      'kundali-matching-online': 'matching',
      'chat-with-astrologer':    'chat',
      'shop':                    'shop',
      'horoscope':               'horoscope',
    };

    function getPageFromURL() {
      const slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
      // Handle horoscope sub-paths: horoscope/daily, horoscope/daily/aries
      if (slug.startsWith('horoscope')) return slug;
      return URL_TO_PAGE[slug] || slug || 'home';
    }

    // Calculator slug check (populated once CalculatorsPage.jsx loads)
    function isCalcSlug(slug) {
      if (slug === 'astrology-calculators') return true;
      if (typeof CALC_SLUGS !== 'undefined' && CALC_SLUGS.includes(slug)) return true;
      return false;
    }

    // Apply SEO meta tags from CMS
    function applySeo(seoMap, pageKey) {
      const s = seoMap[pageKey] || {};
      if (s.metaTitle) document.title = s.metaTitle;
      const setMeta = (name, content, prop) => {
        if (!content) return;
        let el = document.querySelector(prop ? `meta[property="${name}"]` : `meta[name="${name}"]`);
        if (!el) { el = document.createElement('meta'); el.setAttribute(prop ? 'property' : 'name', name); document.head.appendChild(el); }
        el.setAttribute('content', content);
      };
      setMeta('description', s.metaDesc);
      setMeta('og:title', s.ogTitle || s.metaTitle, true);
      setMeta('og:description', s.ogDesc || s.metaDesc, true);
      setMeta('og:image', s.ogImage, true);
      let canon = document.querySelector('link[rel="canonical"]');
      if (s.canonical) { if (!canon) { canon = document.createElement('link'); canon.setAttribute('rel','canonical'); document.head.appendChild(canon); } canon.setAttribute('href', s.canonical); }
    }

    const BACKEND = 'https://kundalibaba-backend-production.up.railway.app/api/v1';

    function CustomPageView({ slug, onNavigate }) {
      const [data, setData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      React.useEffect(() => {
        fetch(`${BACKEND}/cms/custom-pages/${slug}`)
          .then(r => r.ok ? r.json() : null)
          .then(r => { setData(r ? r.data : null); setLoading(false); })
          .catch(() => setLoading(false));
      }, [slug]);
      if (loading) return <div style={{ minHeight:'60vh', display:'flex', alignItems:'center', justifyContent:'center', color:'#A07850' }}>Loading...</div>;
      if (!data) return <div style={{ minHeight:'60vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16 }}>
        <div style={{ fontSize:48 }}>🔮</div>
        <div style={{ fontSize:20, fontWeight:700, color:'#0D1B3E' }}>Page Not Found</div>
        <button onClick={() => onNavigate('home')} style={{ padding:'10px 24px', background:'#E8890C', color:'white', border:'none', borderRadius:8, cursor:'pointer', fontWeight:600 }}>Go Home</button>
      </div>;
      return (
        <div style={{ maxWidth:860, margin:'0 auto', padding:'48px 24px' }}>
          {data.h1 && <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:36, fontWeight:800, color:'#0D1B3E', marginBottom:24 }}>{data.h1}</h1>}
          <div style={{ fontSize:15, lineHeight:1.9, color:'#374151' }} dangerouslySetInnerHTML={{ __html: data.htmlContent || '' }} />
          {data.footerHtml && <div style={{ marginTop:40, paddingTop:24, borderTop:'1px solid #EDD9B8' }} dangerouslySetInnerHTML={{ __html: data.footerHtml }} />}
        </div>
      );
    }

    function App() {
      const [page, setPage] = React.useState(getPageFromURL);
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [user, setUser] = React.useState(Auth.getUser());
      const [showAuth, setShowAuth] = React.useState(false);
      const [seoMap, setSeoMap] = React.useState({});

      React.useEffect(() => {
        fetch(`${BACKEND}/cms/pages`)
          .then(r => r.json()).then(r => setSeoMap(r.data || {})).catch(() => {});
      }, []);

      React.useEffect(() => { applySeo(seoMap, page); }, [seoMap, page]);

      React.useEffect(() => {
        const fn = () => setPage(getPageFromURL());
        window.addEventListener('popstate', fn);
        return () => window.removeEventListener('popstate', fn);
      }, []);

      const onNavigate = (pg) => {
        setPage(pg);
        // Horoscope sub-paths use the slug directly (e.g. 'horoscope/daily/aries')
        const url = PAGE_TO_URL[pg] || (pg.startsWith('horoscope') ? `/${pg}` : `/${pg}`);
        window.history.pushState({}, '', url);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleLogout = async () => {
        try { await KBApi.logout(Auth.getRefresh()); } catch {}
        Auth.clear();
        setUser(null);
      };

      const isKundali = page === 'kundali' || page === 'matching';
      const hideFooter = page === 'chat';
      const isHoroscope = page.startsWith('horoscope');
      const isCalc = isCalcSlug(page);
      const isKnownPage = ['home','kundali','matching','chat','shop'].includes(page) || isHoroscope || isCalc;
      const isCustomPage = !isKnownPage && page !== 'home';

      return (
        <div>
          <KBNav currentPage={page} onNavigate={onNavigate} tweaks={t} user={user} onSignIn={() => setShowAuth(true)} onLogout={handleLogout} />

          {page === 'home'  && <LandingPage onNavigate={onNavigate} />}
          {isKundali        && <KundaliPage onNavigate={onNavigate} tweaks={t} initialSubPage={page} key={page} onShowAuth={() => setShowAuth(true)} />}
          {page === 'chat'  && <ChatPage    onNavigate={onNavigate} tweaks={t} user={user} onShowAuth={() => setShowAuth(true)} />}
          {page === 'shop'  && <ShopPage    onNavigate={onNavigate} />}
          {isHoroscope      && <HoroscopePage path={page} onNavigate={onNavigate} />}
          {isCalc           && <CalculatorsPage path={page} onNavigate={onNavigate} />}
          {isCustomPage     && <CustomPageView slug={page} onNavigate={onNavigate} />}

          {!hideFooter && <KBFooter onNavigate={onNavigate} />}

          {showAuth && <AuthModal onClose={() => setShowAuth(false)} onSuccess={u => setUser(u)} />}

          <TweaksPanel title="Kundalibaba Tweaks">
            <TweakSection label="Hero" />
            <TweakSlider label="Hero font size" value={t.heroSize} min={36} max={72} unit="px" onChange={(v) => setTweak('heroSize', v)} />
            <TweakSection label="Nav" />
            <TweakToggle label="Dark nav always" value={t.darkNav} onChange={(v) => setTweak('darkNav', v)} />
          </TweaksPanel>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
