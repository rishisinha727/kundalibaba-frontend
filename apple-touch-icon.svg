<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">

  <!-- Navy background -->
  <rect width="180" height="180" rx="32" fill="#0D1B3E"/>

  <!--
    Hindu Swastika (卐) — clockwise, kesariya, no ring
    Scaled from 64→180 (factor ~2.81)
    Bar ends: 13→37, 51→143 (reach ±51 from center 90)
    stroke-width: 11 × 2.81 ≈ 31
  -->
  <line x1="90" y1="37"  x2="90"  y2="143" stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>
  <line x1="37" y1="90"  x2="143" y2="90"  stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>
  <line x1="90" y1="37"  x2="143" y2="37"  stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>
  <line x1="143" y1="90" x2="143" y2="143" stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>
  <line x1="90"  y1="143" x2="37" y2="143" stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>
  <line x1="37"  y1="90"  x2="37" y2="37"  stroke="#FF6600" stroke-width="31" stroke-linecap="square"/>

  <!-- Central dot -->
  <circle cx="90" cy="90" r="13" fill="#FFB300"/>

  <!-- Four traditional quadrant dots -->
  <circle cx="124" cy="59"  r="8" fill="#FFB300"/>
  <circle cx="124" cy="121" r="8" fill="#FFB300"/>
  <circle cx="56"  cy="121" r="8" fill="#FFB300"/>
  <circle cx="56"  cy="59"  r="8" fill="#FFB300"/>

</svg>
