// ── Utility components ──────────────────────────────────────────

function Badge({ label, color }) {
  const colors = {
    green:  { bg:'#dcfce7', text:'#166534' },
    red:    { bg:'#fee2e2', text:'#991b1b' },
    yellow: { bg:'#fef9c3', text:'#854d0e' },
    blue:   { bg:'#dbeafe', text:'#1d4ed8' },
    gray:   { bg:'#f3f4f6', text:'#374151' },
    orange: { bg:'#ffedd5', text:'#9a3412' },
  };
  const s = colors[color] || colors.gray;
  return <span style={{ background:s.bg, color:s.text, padding:'2px 10px', borderRadius:999, fontSize:11, fontWeight:700 }}>{label}</span>;
}

function statusBadge(status) {
  const map = {
    online:'green', active:'green', published:'green', delivered:'green', approved:'green', success:'green', paid:'green', shipped:'blue',
    busy:'orange', processing:'blue', pending:'yellow', draft:'yellow',
    offline:'gray', inactive:'gray',
    failed:'red', rejected:'red',
  };
  return <Badge label={status.charAt(0).toUpperCase()+status.slice(1)} color={map[status]||'gray'} />;
}

function Btn({ children, onClick, variant='primary', size='md', style:ex={} }) {
  const base = { border:'none', borderRadius:8, fontFamily:'inherit', fontWeight:600, cursor:'pointer', transition:'all 150ms', display:'inline-flex', alignItems:'center', gap:6 };
  const v = {
    primary:  { background:C.saffron, color:'white' },
    secondary:{ background:'white', color:C.navy, border:'1.5px solid #e5e7eb' },
    danger:   { background:'#fef2f2', color:'#dc2626', border:'1.5px solid #fecaca' },
    success:  { background:'#f0fdf4', color:'#166534', border:'1.5px solid #bbf7d0' },
  };
  const s = { sm:{ padding:'5px 12px', fontSize:12 }, md:{ padding:'8px 18px', fontSize:13 }, lg:{ padding:'11px 24px', fontSize:14 } };
  return <button onClick={onClick} style={{ ...base, ...v[variant], ...s[size], ...ex }}>{children}</button>;
}

function Input({ label, value, onChange, placeholder, type='text', style:ex={} }) {
  return (
    <div style={{ marginBottom:16 }}>
      {label && <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:6 }}>{label}</label>}

        style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, color:'#1f2937', outline:'none', ...ex }}
        onFocus={e => e.target.style.borderColor=C.saffron}
        onBlur={e => e.target.style.borderColor='#e5e7eb'}
      />
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows=4 }) {
  return (
    <div style={{ marginBottom:16 }}>
      {label && <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:6 }}>{label}</label>}
      <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows}
        style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, color:'#1f2937', outline:'none', resize:'vertical', fontFamily:'inherit' }}
        onFocus={e => e.target.style.borderColor=C.saffron}
        onBlur={e => e.target.style.borderColor='#e5e7eb'}
      />
    </div>
  );
}

function Modal({ title, onClose, children, width=560 }) {

        </div>
        <div style={{ padding:24 }}>{children}</div>
      </div>
    </div>
  );
}

    </div>
  );
}

function SearchBar({ value, onChange, placeholder='Search...' }) {
  return (

      style={{ padding:'8px 14px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, color:'#374151', outline:'none', minWidth:220 }}
      onFocus={e => e.target.style.borderColor=C.saffron}
      onBlur={e => e.target.style.borderColor='#e5e7eb'}
    />
  );
}

function THead({ cols }) {
  return (
    <thead>
      <tr style={{ background:'#f9fafb' }}>
        {cols.map(c => <th key={c} style={{ padding:'10px 16px', textAlign:'left', fontSize:11, fontWeight:700, color:'#6b7280', textTransform:'uppercase', letterSpacing:'0.06em', borderBottom:'1px solid #f0f0f0', whiteSpace:'nowrap' }}>{c}</th>)}
      </tr>
    </thead>
  );
}

function TD({ children, style:ex={} }) {
  return <td style={{ padding:'12px 16px', fontSize:13, color:'#374151', borderBottom:'1px solid #f9fafb', verticalAlign:'middle', ...ex }}>{children}</td>;
}

function PageHeader({ title, sub, action }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24 }}>
      <div>
        <h1 style={{ fontSize:22, fontWeight:800, color:'#111827', marginBottom:2 }}>{title}</h1>
        {sub && <p style={{ fontSize:13, color:'#6b7280' }}>{sub}</p>}
      </div>
      {action}
    </div>
  );
}

// ── Revenue Bar Chart ───────────────────────────────────────────
function RevenueChart({ data }) {
  const max = Math.max(...data.map(d => d.amount));
  return (
    <div style={{ background:'white', borderRadius:14, padding:24, border:'1px solid #f0f0f0', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
      <div style={{ fontSize:14, fontWeight:700, color:'#111827', marginBottom:20 }}>Revenue — Last 7 Days</div>
      <div style={{ display:'flex', alignItems:'flex-end', gap:12, height:140 }}>
        {data.map(d => (
          <div key={d.day} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
            <div style={{ fontSize:10, color:'#6b7280', fontWeight:600 }}>₹{(d.amount/1000).toFixed(0)}k</div>
            <div style={{ width:'100%', height:`${(d.amount/max)*100}px`, background:`linear-gradient(to top,${C.saffron},#F5C842)`, borderRadius:'6px 6px 0 0', minHeight:8 }} />
            <div style={{ fontSize:11, color:'#6b7280', fontWeight:600 }}>{d.day}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

                <option value="published">Published</option>
              </select>
            </div>
          </div>
          <Textarea label="Content (CMS)" value={form.content} onChange={e => setForm(f => ({ ...f, content:e.target.value }))} placeholder="Write your blog content here..." rows={8} />
          <Input label="Meta Title" placeholder="SEO title for this blog..." />
          <Textarea label="Meta Description" placeholder="150-160 char description..." rows={2} />
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
            <Btn variant="secondary" onClick={() => setModal(null)}>Cancel</Btn>
            <Btn onClick={() => setModal(null)}>{form.status === 'published' ? 'Publish' : 'Save Draft'}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Sidebar ────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard',   label:'Dashboard',          icon:'📊' },
  { id:'astrologers', label:'Astrologers',         icon:'🔮', parent:'users' },
  { id:'customers',   label:'Customers',           icon:'👥', parent:'users' },
  { id:'vendors',     label:'Vendors',             icon:'🏪', parent:'users' },
  { id:'wallet',      label:'Wallet Management',   icon:'💰' },
  { id:'withdrawals', label:'Withdrawals & Refunds',icon:'🏦' },
  { id:'shop',        label:'Astro Shop',          icon:'💎' },
  { id:'cms',         label:'CMS / SEO',           icon:'🔍' },
  { id:'blogs',       label:'Blog Management',     icon:'✍️' },
];

function Sidebar({ current, onNav, user, onLogout }) {
  const [usersOpen, setUsersOpen] = React.useState(true);
  return (
    <div style={{ width:240, background:C.dark, minHeight:'100vh', display:'flex', flexDirection:'column', flexShrink:0, position:'sticky', top:0, height:'100vh', overflow:'auto' }}>
      {/* Logo */}
      <div style={{ padding:'20px 20px 16px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <svg width="28" height="28" viewBox="0 0 64 64" fill="none">
            <polygon points="32,6 35.5,24 50,16 40,29 56,32 40,35 50,48 35.5,40 32,58 28.5,40 14,48 24,35 8,32 24,29 14,16 28.5,24" fill="#E8890C" opacity="0.9"/>
            <circle cx="32" cy="32" r="5" fill="#F5C842"/>
          </svg>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:'white' }}>Kundalibaba</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', fontWeight:600, letterSpacing:'0.08em' }}>ADMIN PANEL</div>
          </div>
        </div>
      </div>
      {/* Nav */}
      <nav style={{ flex:1, padding:'12px 8px', overflow:'auto' }}>
        {/* Dashboard */}
        <NavItem id="dashboard" label="Dashboard" icon="📊" current={current} onNav={onNav} />
        {/* User Management group */}
        <div onClick={() => setUsersOpen(o => !o)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 14px', cursor:'pointer', borderRadius:8, marginBottom:2 }}>
          <span style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.35)', textTransform:'uppercase', letterSpacing:'0.1em' }}>User Management</span>
          <span style={{ color:'rgba(255,255,255,0.35)', fontSize:11 }}>{usersOpen ? '▲' : '▼'}</span>
        </div>
        {usersOpen && ['astrologers','customers','vendors'].map(id => {
          const n = NAV.find(x => x.id === id);
          return <NavItem key={id} id={id} label={n.label} icon={n.icon} current={current} onNav={onNav} indent />;
        })}
        <div style={{ height:1, background:'rgba(255,255,255,0.07)', margin:'8px 8px' }} />
        {['wallet','withdrawals','shop','cms','blogs'].map(id => {
          const n = NAV.find(x => x.id === id);
          return <NavItem key={id} id={id} label={n.label} icon={n.icon} current={current} onNav={onNav} />;
        })}
      </nav>
      {/* User */}
      <div style={{ padding:'14px 16px', borderTop:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:`${C.saffron}33`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:C.saffron, flexShrink:0 }}>
            {(user?.name || 'A')[0].toUpperCase()}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.9)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user?.name || 'Admin'}</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user?.email}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{ width:'100%', padding:'7px 0', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
          Sign Out
        </button>
      </div>
    </div>
  );
}

function NavItem({ id, label, icon, current, onNav, indent }) {
  const active = current === id;
  return (
    <div onClick={() => onNav(id)} style={{
      display:'flex', alignItems:'center', gap:10,
      padding: indent ? '7px 14px 7px 28px' : '8px 14px',
      borderRadius:8, cursor:'pointer', marginBottom:2,
      background: active ? `${C.saffron}22` : 'transparent',
      borderLeft: active ? `3px solid ${C.saffron}` : '3px solid transparent',
      transition:'all 150ms',
    }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background='rgba(255,255,255,0.05)'; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background='transparent'; }}
    >
      <span style={{ fontSize:15 }}>{icon}</span>
      <span style={{ fontSize:13, fontWeight: active ? 700 : 500, color: active ? C.saffron : 'rgba(255,255,255,0.65)', whiteSpace:'nowrap' }}>{label}</span>
    </div>
  );
}

// ── Login Page ─────────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [status, setStatus] = React.useState('loading');
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    window.__adminGoogleCb = async (response) => {
      setLoading(true); setError('');
      try {
        const res = await KBApi.googleLogin(response.credential);
        const user = res.data.user;
        if (user.email !== ADMIN_EMAIL) {
          Auth.clear();
          setError(`Access denied. Only ${ADMIN_EMAIL} can access the admin panel.`);
          setLoading(false);
          return;
        }
        Auth.setToken(res.data.accessToken);
        Auth.setRefresh(res.data.refreshToken);
        Auth.setUser(user);
        onLogin(user);
      } catch(e) {
        setError(e.message || 'Login failed. Please try again.');
        setLoading(false);
      }
    };
    let attempts = 0;
    const tryRender = () => {
      attempts++;
      if (containerRef.current && window.google?.accounts?.id) {
        try {
          window.google.accounts.id.initialize({ client_id:GOOGLE_CLIENT_ID, callback:window.__adminGoogleCb });
          window.google.accounts.id.renderButton(containerRef.current, { theme:'outline', size:'large', text:'signin_with', shape:'rectangular', width:320 });
          setStatus('ready');
        } catch { setStatus('error'); setError('Google Sign-In failed to load.'); }
      } else if (attempts < 40) {
        setTimeout(tryRender, 250);
      } else {
        setStatus('error'); setError('Google Sign-In could not load. Please refresh.');
      }
    };
    const t = setTimeout(tryRender, 400);
    return () => { clearTimeout(t); delete window.__adminGoogleCb; };
  }, []);

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#060D20,#0D1B3E)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div style={{ background:'white', borderRadius:24, padding:48, width:'100%', maxWidth:420, boxShadow:'0 32px 80px rgba(0,0,0,0.3)', textAlign:'center' }}>
        <div style={{ marginBottom:32 }}>
          <div style={{ width:64, height:64, borderRadius:16, background:'rgba(232,137,12,0.12)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:32, margin:'0 auto 16px' }}>🔐</div>
          <h1 style={{ fontSize:24, fontWeight:800, color:'#111827', marginBottom:6 }}>Admin Panel</h1>
          <p style={{ fontSize:13, color:'#6b7280' }}>KundaliBaba — Restricted Access</p>
        </div>
        {loading && <div style={{ fontSize:14, color:C.saffron, marginBottom:16 }}>⏳ Verifying access...</div>}
        {error && <div style={{ fontSize:13, color:'#dc2626', background:'#fef2f2', border:'1px solid #fecaca', padding:'10px 14px', borderRadius:10, marginBottom:16 }}>{error}</div>}
        <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
          <div ref={containerRef} style={{ width:320, minHeight:44 }}>
            {status === 'loading' && <div style={{ width:320, height:44, border:'1px solid #e5e7eb', borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#9ca3af' }}>Loading Google Sign-In...</div>}
          </div>
        </div>
        <p style={{ fontSize:11, color:'#9ca3af' }}>Only authorized admin accounts can access this panel.</p>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function AdminApp() {
  const stored = Auth.getUser();
  const isAdmin = stored?.email === ADMIN_EMAIL;
  const [user, setUser] = React.useState(isAdmin ? stored : null);
  const [section, setSection] = React.useState('dashboard');

  const handleLogout = async () => {
    try { await KBApi.logout(Auth.getRefresh()); } catch {}
    Auth.clear();
    setUser(null);
  };

  if (!user) return <AdminLogin onLogin={setUser} />;

  const PAGES = { dashboard:<Dashboard />, astrologers:<Astrologers />, customers:<Customers />, vendors:<Vendors />, wallet:<WalletManagement />, withdrawals:<Withdrawals />, shop:<AstroShop />, cms:<CMS />, blogs:<Blogs /> };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar current={section} onNav={setSection} user={user} onLogout={handleLogout} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* Top bar */}
        <div style={{ background:'white', borderBottom:'1px solid #f0f0f0', padding:'14px 28px', display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top:0, zIndex:100 }}>
          <div style={{ fontSize:13, color:'#6b7280' }}>
            <span style={{ color:C.saffron, fontWeight:600 }}>Admin</span> / {NAV.find(n => n.id === section)?.label || section}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <a href="/" target="_blank" style={{ fontSize:12, color:C.saffron, fontWeight:600, textDecoration:'none' }}>↗ View Site</a>
            <div style={{ fontSize:12, color:'#6b7280' }}>👤 {user.name || user.email}</div>
          </div>
        </div>
        {/* Content */}
        <div style={{ flex:1, padding:28, overflow:'auto' }}>
          {PAGES[section] || <Dashboard />}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AdminApp />);
  </script>
</body>
