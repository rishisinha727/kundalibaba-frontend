// ── Utility components ──────────────────────────────────────────

function Badge({ label, color }) {
  const colors = {
    green:  { bg:'#dcfce7', text:'#166534' },
    red:    { bg:'#fee2e2', text:'#991b1b' },
    yellow: { bg:'#fef9c3', text:'#854d0e' },
    blue:   { bg:'#dbeafe', text:'#1d4ed8' },
    gray:   { bg:'#f3f4f6', text:'#374151' },
    orange: { bg:'#ffedd5', text:'#9a3412' },
  };
  const s = colors[color] || colors.gray;
  return <span style={{ background:s.bg, color:s.text, padding:'2px 10px', borderRadius:999, fontSize:11, fontWeight:700 }}>{label}</span>;
}

function statusBadge(status) {
  const map = {
    online:'green', active:'green', published:'green', delivered:'green', approved:'green', success:'green', paid:'green', shipped:'blue',
    busy:'orange', processing:'blue', pending:'yellow', draft:'yellow',
    offline:'gray', inactive:'gray',
    failed:'red', rejected:'red',
  };
  return <Badge label={status.charAt(0).toUpperCase()+status.slice(1)} color={map[status]||'gray'} />;
}

function Btn({ children, onClick, variant='primary', size='md', style:ex={} }) {
  const base = { border:'none', borderRadius:8, fontFamily:'inherit', fontWeight:600, cursor:'pointer', transition:'all 150ms', display:'inline-flex', alignItems:'center', gap:6 };
  const v = {
    primary:  { background:C.saffron, color:'white' },
    secondary:{ background:'white', color:C.navy, border:'1.5px solid #e5e7eb' },
    danger:   { background:'#fef2f2', color:'#dc2626', border:'1.5px solid #fecaca' },
    success:  { background:'#f0fdf4', color:'#166534', border:'1.5px solid #bbf7d0' },
  };
  const s = { sm:{ padding:'5px 12px', fontSize:12 }, md:{ padding:'8px 18px', fontSize:13 }, lg:{ padding:'11px 24px', fontSize:14 } };
  return <button onClick={onClick} style={{ ...base, ...v[variant], ...s[size], ...ex }}>{children}</button>;
}

function Input({ label, value, onChange, placeholder, type='text', style:ex={} }) {
  return (
    <div style={{ marginBottom:16 }}>
      {label && <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:6 }}>{label}</label>}

        style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, color:'#1f2937', outline:'none', ...ex }}
        onFocus={e => e.target.style.borderColor=C.saffron}
        onBlur={e => e.target.style.borderColor='#e5e7eb'}
      />
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows=4 }) {

    <div style={{ marginBottom:16 }}>
      {label && <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:6 }}>{label}</label>}

        onFocus={e => e.target.style.borderColor=C.saffron}
        onBlur={e => e.target.style.borderColor='#e5e7eb'}
      />
    </div>
  );
}

  );
}

function THead({ cols }) {
  return (
    <thead>
      <tr style={{ background:'#f9fafb' }}>
        {cols.map(c => <th key={c} style={{ padding:'10px 16px', textAlign:'left', fontSize:11, fontWeight:700, color:'#6b7280', textTransform:'uppercase', letterSpacing:'0.06em', borderBottom:'1px solid #f0f0f0', whiteSpace:'nowrap' }}>{c}</th>)}
      </tr>
    </thead>
  );
}

function TD({ children, style:ex={} }) {
  return <td style={{ padding:'12px 16px', fontSize:13, color:'#374151', borderBottom:'1px solid #f9fafb', verticalAlign:'middle', ...ex }}>{children}</td>;
}

function PageHeader({ title, sub, action }) {

    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24 }}>

      {action}
    </div>

}

// ── Revenue Bar Chart ───────────────────────────────────────────
function RevenueChart({ data }) {
  const max = Math.max(...data.map(d => d.amount));
  return (
    <div style={{ background:'white', borderRadius:14, padding:24, border:'1px solid #f0f0f0', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' }}>
      <div style={{ fontSize:14, fontWeight:700, color:'#111827', marginBottom:20 }}>Revenue — Last 7 Days</div>
      <div style={{ display:'flex', alignItems:'flex-end', gap:12, height:140 }}>
        {data.map(d => (
          <div key={d.day} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
            <div style={{ fontSize:10, color:'#6b7280', fontWeight:600 }}>₹{(d.amount/1000).toFixed(0)}k</div>
            <div style={{ width:'100%', height:`${(d.amount/max)*100}px`, background:`linear-gradient(to top,${C.saffron},#F5C842)`, borderRadius:'6px 6px 0 0', minHeight:8 }} />
            <div style={{ fontSize:11, color:'#6b7280', fontWeight:600 }}>{d.day}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Withdrawals() {
  const [data, setData] = React.useState(WITHDRAWALS);
  const approve = id => setData(d => d.map(w => w.id === id ? { ...w, status:'approved' } : w));
  const reject  = id => setData(d => d.map(w => w.id === id ? { ...w, status:'rejected' } : w));
  return (
    <div style={{ animation:'fadeIn 200ms ease' }}>
      <PageHeader title="Withdrawals & Refunds" sub="Manage payout requests from astrologers" />
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16, marginBottom:24 }}>

        <StatCard label="Approved This Month" value="8"  sub="₹1.4L paid"   icon="✅" color="#2E7D32" />

      </div>
      <div style={{ background:'white', borderRadius:14, border:'1px solid #f0f0f0', boxShadow:'0 1px 4px rgba(0,0,0,0.05)', marginBottom:28 }}>

        <table>
          <THead cols={['Request ID','Astrologer','Amount','Bank','Requested On','Status','Actions']} />
          <tbody>

              <tr key={w.id}>
                <TD><span style={{ fontFamily:'monospace', fontSize:12 }}>{w.id}</span></TD>
                <TD style={{ fontWeight:600 }}>{w.astrologer}</TD>

                <TD><span style={{ fontFamily:'monospace', fontSize:12 }}>{w.bank}</span></TD>
                <TD>{w.requested}</TD>
                <TD>{statusBadge(w.status)}</TD>
                <TD>

  );
}

// ── Shared SEO Fields component (tabbed) ─────────────────────
function SeoFields({ form, setForm }) {
  const [tab, setTab] = React.useState('meta');
  const cc = (form.metaDesc||'').length;
  const tc = (form.metaTitle||'').length;
  const lbl = (text, extra) => <label style={{ display:'flex', justifyContent:'space-between', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}><span>{text}</span>{extra||null}</label>;
  const inp = (key, props={}) => <input value={form[key]||''} onChange={e => setForm(f=>({...f,[key]:e.target.value}))} style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, outline:'none', boxSizing:'border-box', ...props.style }} {...props} />;
  const ta = (key, rows=4, props={}) => <textarea value={form[key]||''} onChange={e => setForm(f=>({...f,[key]:e.target.value}))} rows={rows} style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, outline:'none', resize:'vertical', boxSizing:'border-box', fontFamily:'monospace', ...props.style }} {...props} />;
  const tabs = [['meta','🏷 Meta Tags'],['header','📄 Header Content'],['footer','📝 Footer Content'],['faq','❓ FAQ Schema']];

  return (
    <>
      <div style={{ display:'flex', gap:4, marginBottom:16, borderBottom:'2px solid #f0f0f0', paddingBottom:0 }}>
        {tabs.map(([id,label]) => (
          <button key={id} onClick={() => setTab(id)} style={{ padding:'7px 14px', fontSize:12, fontWeight:600, border:'none', borderBottom: tab===id ? '2px solid #E8890C' : '2px solid transparent', background:'none', cursor:'pointer', color: tab===id ? '#E8890C' : '#6b7280', marginBottom:-2 }}>{label}</button>
        ))}
      </div>

      {tab === 'meta' && (
        <>
          <div style={{ background:'#f0f9ff', border:'1px solid #bae6fd', borderRadius:10, padding:'10px 14px', marginBottom:14, fontSize:11.5, color:'#0369a1' }}>
            <strong>Guidelines:</strong> Title 50–60 chars · Description 150–160 chars · Canonical = full URL · OG image 1200×630px
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
            <div>{lbl('Meta Title', <span style={{ color:tc>60?'#ef4444':tc>50?'#f59e0b':'#9ca3af', fontWeight:400 }}>{tc}/60</span>)}{inp('metaTitle',{maxLength:70,placeholder:'55–60 chars · include main keyword'})}</div>
            <div>{lbl('H1 Tag')}{inp('h1',{placeholder:'Main heading — match primary keyword'})}</div>
          </div>
          <div style={{ marginBottom:12 }}>
            {lbl('Meta Description', <span style={{ color:cc>160?'#ef4444':cc>130?'#f59e0b':'#9ca3af', fontWeight:400 }}>{cc}/160</span>)}
            {ta('metaDesc',3,{maxLength:170,placeholder:'150–160 chars · compelling & keyword-rich'})}
          </div>
          <div style={{ marginBottom:12 }}>{lbl('Canonical URL')}{inp('canonical',{placeholder:'https://kundalibaba.com/page-slug'})}</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
            <div>{lbl('OG Title')}{inp('ogTitle',{placeholder:'Facebook / WhatsApp / Twitter title'})}</div>
            <div>{lbl('OG Image URL')}{inp('ogImage',{placeholder:'https://... (1200×630px)'})}</div>
          </div>
          <div>{lbl('OG Description')}{ta('ogDesc',2,{placeholder:'Social media preview description'})}</div>
        </>
      )}

      {tab === 'header' && (
        <>
          <div style={{ background:'#fefce8', border:'1px solid #fde68a', borderRadius:10, padding:'10px 14px', marginBottom:14, fontSize:11.5, color:'#92400e' }}>
            <strong>Header Content:</strong> Shown at the top of the page below the hero. Should contain H1 and ~100 words of keyword-rich intro. Use plain HTML: &lt;h1&gt;, &lt;p&gt; tags only.
          </div>
          {lbl('Header / Intro Content (HTML)')}
          {ta('headerContent', 14, { placeholder: '<h1>Your Page H1 Here</h1>\n<p>Introductory paragraph of ~100 words that includes primary and secondary keywords naturally. This is shown to users at the top of the page and to search engines as the primary content block...</p>' })}
        </>
      )}

      {tab === 'footer' && (
        <>
          <div style={{ background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:10, padding:'10px 14px', marginBottom:14, fontSize:11.5, color:'#166534' }}>
            <strong>Footer SEO Content:</strong> Shown below the page main content. Must include: 7 H2 subheadings, 1 data table with H2 heading, internal links to prime pages naturally. Human-written tone. No keyword stuffing.
          </div>
          {lbl('Footer SEO Content (HTML)')}
          {ta('footerHtml', 20, { placeholder: '<h2>About Kundali Reading Online</h2>\n<p>...</p>\n\n<h2>How Vedic Astrology Works</h2>\n<p>...</p>\n\n<!-- table -->\n<h2>Planetary Periods at a Glance</h2>\n<table>...</table>\n\n<!-- more H2s -->' })}
        </>
      )}

      {tab === 'faq' && (
        <>
          <div style={{ background:'#faf5ff', border:'1px solid #e9d5ff', borderRadius:10, padding:'10px 14px', marginBottom:14, fontSize:11.5, color:'#6b21a8' }}>
            <strong>FAQ Schema:</strong> Paste the JSON-LD FAQ schema here (starts with <code>{`{"@context":"https://schema.org"...`}</code>). It will be injected into &lt;head&gt; on the page. Min 7 FAQs. Also add the FAQ HTML in Footer Content above.
          </div>
          {lbl('FAQ JSON-LD Schema')}
          {ta('faqSchema', 20, { placeholder: '{\n  "@context": "https://schema.org",\n  "@type": "FAQPage",\n  "mainEntity": [\n    {\n      "@type": "Question",\n      "name": "What is...",\n      "acceptedAnswer": { "@type": "Answer", "text": "..." }\n    }\n  ]\n}' })}
        </>
      )}
    </>
  );
}

function CMS() {
  const [cmsTab, setCmsTab] = React.useState('pages');
  const [seoData, setSeoData] = React.useState({});
  const [customPages, setCustomPages] = React.useState([]);
  const [dynamicPageDefs, setDynamicPageDefs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState(false);
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({});
  const [preview, setPreview] = React.useState(false);
  const [toast, setToast] = React.useState('');
  const [delConfirm, setDelConfirm] = React.useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3500); };

  React.useEffect(() => {
    const token = Auth.getToken();
    Promise.all([
      fetch(`${API}/cms/pages`).then(r=>r.json()),
      fetch(`${API}/cms/custom-pages`, { headers:{ Authorization:`Bearer ${token}` } }).then(r=>r.json()),
      fetch(`${API}/content/blogs/admin/all`, { headers:{ Authorization:`Bearer ${token}` } }).then(r=>r.json()).catch(()=>({ data:[] })),
    ]).then(([p, cp, blogs]) => {
      setSeoData(p.data || {});
      const cpList = cp.data || [];
      setCustomPages(cpList);

      // Build dynamic page defs from custom pages + blog articles
      const dyn = [];
      cpList.forEach(pg => {
        dyn.push({ key: pg.slug, name: pg.title, url: `/${pg.slug}`, section: 'Custom Pages' });
      });
      const blogList = Array.isArray(blogs.data) ? blogs.data : [];
      blogList.forEach(b => {
        dyn.push({ key: `articles/${b.slug}`, name: b.title, url: `/articles/${b.slug}`, section: 'Blog Articles' });
      });
      setDynamicPageDefs(dyn);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);

  const slugify = t => t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

  // ── Fixed page SEO ──
  const openEditSeo = (pd) => {
    const s = seoData[pd.key] || {};
    setForm({ _type:'seo', key:pd.key, name:pd.name, url:pd.url,
      metaTitle:s.metaTitle||'', metaDesc:s.metaDesc||'', h1:s.h1||'',
      canonical:s.canonical||`https://kundalibaba.com${pd.url}`,
      ogTitle:s.ogTitle||'', ogDesc:s.ogDesc||'', ogImage:s.ogImage||'',
      headerContent:s.headerContent||'', footerHtml:s.footerHtml||'', faqSchema:s.faqSchema||'' });
    setModal('editSeo');
  };
  const saveSeo = async () => {
    setSaving(true);
    try {
      const res = await fetch(`${API}/cms/pages/${form.key}`, {
        method:'PUT', headers:{ 'Content-Type':'application/json', Authorization:`Bearer ${Auth.getToken()}` },
        body: JSON.stringify({ metaTitle:form.metaTitle, metaDesc:form.metaDesc, h1:form.h1, canonical:form.canonical, ogTitle:form.ogTitle, ogDesc:form.ogDesc, ogImage:form.ogImage, headerContent:form.headerContent, footerHtml:form.footerHtml, faqSchema:form.faqSchema }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message || 'Save failed');
      setSeoData(d => ({ ...d, [form.key]: json.data }));
      setModal(null); showToast('✅ SEO saved!');
    } catch(e) { showToast(`❌ ${e.message}`); }
    setSaving(false);
  };

  // ── Custom pages ──
  const emptyPage = { _type:'custom', slug:'', title:'', htmlContent:'', isPublished:false, metaTitle:'', metaDesc:'', h1:'', canonical:'', ogTitle:'', ogDesc:'', ogImage:'', footerHtml:'' };
  const openNewPage = () => { setForm(emptyPage); setPreview(false); setModal('customPage'); };
  const openEditPage = (p) => { setForm({ _type:'custom', ...p, slug:p.slug }); setPreview(false); setModal('customPage'); };

  const saveCustomPage = async () => {
    setSaving(true);
    try {
      const isNew = !form.id;
      const url = isNew ? `${API}/cms/custom-pages` : `${API}/cms/custom-pages/${form.slug}`;
      const res = await fetch(url, {
        method: isNew ? 'POST' : 'PUT',
        headers:{ 'Content-Type':'application/json', Authorization:`Bearer ${Auth.getToken()}` },
        body: JSON.stringify(form),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.message || 'Save failed');
      if (isNew) setCustomPages(p => [json.data, ...p]);
      else setCustomPages(p => p.map(x => x.slug === form.slug ? json.data : x));
      setModal(null); showToast('✅ Page saved!');
    } catch(e) { showToast(`❌ ${e.message}`); }
    setSaving(false);
  };

  const deleteCustomPage = async (slug) => {
    try {
      await fetch(`${API}/cms/custom-pages/${slug}`, { method:'DELETE', headers:{ Authorization:`Bearer ${Auth.getToken()}` } });
      setCustomPages(p => p.filter(x => x.slug !== slug));
      setDelConfirm(null); showToast('✅ Page deleted');
    } catch(e) { showToast(`❌ ${e.message}`); }
  };

  const tabSt = active => ({ padding:'9px 20px', border:'none', borderRadius:8, fontFamily:'inherit', fontSize:13, fontWeight:600, cursor:'pointer', background: active ? C.saffron : 'transparent', color: active ? 'white' : '#6b7280', transition:'all 150ms' });

  return (
    <div style={{ animation:'fadeIn 200ms ease' }}>

        action={cmsTab === 'custom' ? <Btn onClick={openNewPage}>+ New Page</Btn> : null} />

      {toast && <div style={{ position:'fixed', top:24, right:24, zIndex:999, background:toast.startsWith('✅')?'#f0fdf4':'#fef2f2', border:`1px solid ${toast.startsWith('✅')?'#bbf7d0':'#fecaca'}`, color:toast.startsWith('✅')?'#15803d':'#dc2626', padding:'12px 20px', borderRadius:10, fontSize:13, fontWeight:600, boxShadow:'0 4px 12px rgba(0,0,0,0.1)' }}>{toast}</div>}

      <div style={{ display:'flex', gap:4, background:'white', padding:4, borderRadius:10, width:'fit-content', border:'1px solid #e5e7eb', marginBottom:20 }}>
        {[['pages','Page SEO'],['custom','Custom Pages']].map(([id,label]) => (
          <button key={id} onClick={() => setCmsTab(id)} style={tabSt(cmsTab===id)}>{label}</button>
        ))}
      </div>

      {loading ? <div style={{ textAlign:'center', padding:48, color:'#9ca3af' }}>Loading...</div> : (<>

        {/* ── Fixed page SEO tab ── */}
        {cmsTab === 'pages' && (() => {
          const allDefs = [...PAGE_DEFS, ...dynamicPageDefs];
          const sections = [...new Set(allDefs.map(p => p.section))];
          const seoSection = (sec) => {
            const pages = allDefs.filter(p => p.section === sec);
            const filled = pages.filter(p => seoData[p.key]?.metaTitle).length;
            return (
              <div key={sec} style={{ background:'white', borderRadius:14, border:'1px solid #f0f0f0', boxShadow:'0 1px 4px rgba(0,0,0,0.05)', overflow:'hidden' }}>

                  <span style={{ fontSize:13, fontWeight:700, color:'#374151' }}>{sec}</span>
                  <span style={{ fontSize:11, color:'#9ca3af' }}>{pages.length} pages</span>

                </div>

                  <THead cols={['Page','URL','Meta Title','Meta Desc','Actions']} />

                    {pages.map(pd => {
                      const s = seoData[pd.key] || {};

                          <TD style={{ fontWeight:600, display:'flex', alignItems:'center', gap:6 }}>

// Returns ISO date string offset from today (for yesterday/tomorrow API calls)
function horoDateFor(period) {
  const d = new Date();
  if (period === 'yesterday') d.setDate(d.getDate() - 1);
  if (period === 'tomorrow')  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

const HORO_PERIODS = [
  { key:'yesterday', label:'Yesterday' },
  { key:'daily',     label:'Today'     },
  { key:'tomorrow',  label:'Tomorrow'  },
  { key:'weekly',    label:'Weekly'    },
  { key:'monthly',   label:'Monthly'   },
];

// Maps tab key → API period param
function horoApiPeriod(p) {
  if (p === 'yesterday' || p === 'tomorrow') return 'daily';
  return p;
}

// ── Rich Text Editor (Quill) ────────────────────────────────────
function RichEditor({ value, onChange, placeholder }) {
  const editorRef = React.useRef(null);
  const quillRef = React.useRef(null);

  React.useEffect(() => {
    if (!editorRef.current || quillRef.current) return;
    quillRef.current = new Quill(editorRef.current, {
      theme: 'snow',
      placeholder: placeholder || 'Write your blog content here...',
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ color: [] }, { background: [] }],
          [{ list: 'ordered' }, { list: 'bullet' }],
          [{ indent: '-1' }, { indent: '+1' }],
          ['blockquote', 'code-block'],
          ['link', 'image'],
          ['clean'],
        ],
      },
    });
    if (value) quillRef.current.root.innerHTML = value;
    quillRef.current.on('text-change', () => {
      onChange && onChange(quillRef.current.root.innerHTML);
    });
  }, []);

  return <div ref={editorRef} />;
}

            <Btn onClick={() => { if (newSub.trim()) setSubCats(s => ({ ...s, [selCat]:[...(s[selCat]||[]),newSub.trim()] })); setCatModal(false); setNewSub(''); }}>Add</Btn>
          </div>
        </Modal>
      )}

      {modal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', zIndex:200, overflowY:'auto', padding:'24px 16px' }}>
          <div style={{ background:'white', borderRadius:16, maxWidth:960, margin:'0 auto', boxShadow:'0 24px 64px rgba(0,0,0,0.2)', overflow:'hidden' }}>

            {/* Editor Header */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'18px 28px', borderBottom:'1px solid #f0f0f0', background:'#fafafa' }}>
              <div style={{ fontSize:17, fontWeight:700, color:'#111827' }}>
                {modal === 'add' ? '✍️ New Blog Post' : '✏️ Edit Blog Post'}
              </div>
              <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                <button onClick={() => setPreview(p => !p)}
                  style={{ padding:'7px 16px', borderRadius:8, border:'1.5px solid #e5e7eb', background: preview ? '#f0f4ff' : 'white', color: preview ? '#3b5bdb' : '#374151', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                  {preview ? '✏️ Edit' : '👁 Preview'}
                </button>
                <button onClick={() => setModal(null)} style={{ background:'none', border:'none', fontSize:22, cursor:'pointer', color:'#9ca3af', lineHeight:1 }}>×</button>
              </div>
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 300px', minHeight:600 }}>
              {/* Main editor area */}
              <div style={{ padding:'24px 28px', borderRight:'1px solid #f0f0f0', overflowY:'auto' }}>
                {preview ? (
                  <div>
                    {form.featuredImg && <img src={form.featuredImg} alt="" style={{ width:'100%', height:220, objectFit:'cover', borderRadius:10, marginBottom:20 }} onError={e => e.target.style.display='none'} />}
                    <h1 style={{ fontSize:26, fontWeight:800, color:'#111827', marginBottom:8, lineHeight:1.3 }}>{form.title || 'Untitled Post'}</h1>
                    <div style={{ fontSize:12, color:'#9ca3af', marginBottom:20 }}>{form.category} · {form.author} · {new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
                    {form.excerpt && <p style={{ fontSize:14, color:'#6b7280', fontStyle:'italic', borderLeft:'3px solid #e8890c', paddingLeft:14, marginBottom:20 }}>{form.excerpt}</p>}
                    <div style={{ fontSize:14, lineHeight:1.8, color:'#374151' }} dangerouslySetInnerHTML={{ __html: form.content || '<p style="color:#9ca3af">No content yet...</p>' }} />
                  </div>
                ) : (
                  <>
                    <div style={{ marginBottom:16 }}>
                      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Blog Title *</label>
                      <input value={form.title} onChange={e => { const t = e.target.value; setForm(f => ({ ...f, title:t, slug: f.slug || slugify(t) })); }}
                        placeholder="Enter a compelling blog title..."
                        style={{ width:'100%', padding:'10px 14px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:15, fontWeight:600, outline:'none' }} />
                    </div>
                    <div style={{ marginBottom:16 }}>
                      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Excerpt / Summary</label>
                      <textarea value={form.excerpt} onChange={e => setForm(f => ({ ...f, excerpt:e.target.value }))}
                        placeholder="Short description shown in blog listing..." rows={2}
                        style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, resize:'vertical', outline:'none' }} />
                    </div>
                    <div style={{ marginBottom:6 }}>
                      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Content *</label>
                    </div>
                    <RichEditor key={editorKey} value={form.content} onChange={v => setForm(f => ({ ...f, content:v }))} />
                  </>
                )}
              </div>

              {/* Right sidebar */}
              <div style={{ padding:'24px 20px', overflowY:'auto', background:'#fafafa' }}>
                <div style={{ fontSize:12, fontWeight:700, color:'#374151', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:14 }}>Post Settings</div>

                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Status</label>
                  <select value={form.status} onChange={e => setForm(f => ({ ...f, status:e.target.value }))}
                    style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, background:'white' }}>
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                  </select>
                </div>

                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Category</label>
                  <select value={form.category} onChange={e => setForm(f => ({ ...f, category:e.target.value, subCategory:'' }))}
                    style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, background:'white' }}>
                    {BLOG_CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                  </select>
                </div>
                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Sub-Category</label>
                  <select value={form.subCategory} onChange={e => setForm(f => ({ ...f, subCategory:e.target.value }))}
                    style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, background:'white' }}>
                    <option value="">— None —</option>
                    {(BLOG_CATEGORIES.find(c=>c.id===form.category)?.subs||[]).map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>

                {fld('Author', 'author', { placeholder:'Author name...' })}

                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>URL Slug</label>
                  <div style={{ display:'flex', alignItems:'center', border:'1.5px solid #e5e7eb', borderRadius:8, overflow:'hidden', background:'white' }}>
                    <span style={{ padding:'9px 8px 9px 12px', fontSize:11, color:'#9ca3af', flexShrink:0 }}>/articles/</span>
                    <input value={form.slug} onChange={e => setForm(f => ({ ...f, slug:slugify(e.target.value) }))}
                      placeholder="url-slug" style={{ flex:1, padding:'9px 12px 9px 0', border:'none', fontSize:12, outline:'none' }} />
                  </div>
                </div>

                {fld('Featured Image URL', 'featuredImg', { placeholder:'https://...' })}
                {form.featuredImg && <img src={form.featuredImg} alt="" style={{ width:'100%', height:100, objectFit:'cover', borderRadius:8, marginBottom:14, marginTop:-8 }} onError={e => e.target.style.display='none'} />}

                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>Tags</label>
                  <input value={form.tags} onChange={e => setForm(f => ({ ...f, tags:e.target.value }))}
                    placeholder="vedic, kundali, jupiter..." style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:13, outline:'none' }} />
                  <div style={{ fontSize:11, color:'#9ca3af', marginTop:4 }}>Comma separated</div>
                </div>

                <div style={{ height:1, background:'#e5e7eb', margin:'18px 0' }} />
                <div style={{ fontSize:12, fontWeight:700, color:'#374151', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:14 }}>SEO</div>

                {fld('Meta Title', 'metaTitle', { placeholder:'SEO title (50-60 chars)', maxLength:60 })}
                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'flex', justifyContent:'space-between', fontSize:12, fontWeight:600, color:'#374151', marginBottom:5 }}>
                    <span>Meta Description</span>
                    <span style={{ color: charCount > 160 ? '#ef4444' : charCount > 130 ? '#f59e0b' : '#9ca3af', fontWeight:400 }}>{charCount}/160</span>
                  </label>
                  <textarea value={form.metaDesc} onChange={e => setForm(f => ({ ...f, metaDesc:e.target.value }))}
                    placeholder="150-160 char description for search engines..." rows={3} maxLength={160}
                    style={{ width:'100%', padding:'9px 12px', border:'1.5px solid #e5e7eb', borderRadius:8, fontSize:12, resize:'none', outline:'none' }} />
                </div>

                <div style={{ height:1, background:'#e5e7eb', margin:'6px 0 18px' }} />
                <div style={{ display:'flex', gap:8 }}>
                  <Btn variant="secondary" onClick={() => setModal(null)} style={{ flex:1 }}>Cancel</Btn>
                  <Btn onClick={savePost} style={{ flex:1 }}>{form.status === 'published' ? '🚀 Publish' : '💾 Save Draft'}</Btn>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Sidebar ────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard',   label:'Dashboard',          icon:'📊' },
  { id:'astrologers', label:'Astrologers',         icon:'🔮', parent:'users' },
  { id:'customers',   label:'Customers',           icon:'👥', parent:'users' },
  { id:'vendors',     label:'Vendors',             icon:'🏪', parent:'users' },
  { id:'wallet',      label:'Wallet Management',   icon:'💰' },
  { id:'withdrawals', label:'Withdrawals & Refunds',icon:'🏦' },
  { id:'shop',        label:'Astro Shop',          icon:'💎' },
  { id:'cms',         label:'CMS / SEO',           icon:'🔍' },
  { id:'blogs',       label:'Blog Management',     icon:'✍️' },
  { id:'horoscopes',  label:'Horoscopes',          icon:'🔮' },
];

function Sidebar({ current, onNav, user, onLogout }) {
  const [usersOpen, setUsersOpen] = React.useState(true);
  return (
    <div style={{ width:240, background:C.dark, minHeight:'100vh', display:'flex', flexDirection:'column', flexShrink:0, position:'sticky', top:0, height:'100vh', overflow:'auto' }}>
      {/* Logo */}
      <div style={{ padding:'20px 20px 16px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <svg width="28" height="28" viewBox="0 0 64 64" fill="none">
            <polygon points="32,6 35.5,24 50,16 40,29 56,32 40,35 50,48 35.5,40 32,58 28.5,40 14,48 24,35 8,32 24,29 14,16 28.5,24" fill="#E8890C" opacity="0.9"/>
            <circle cx="32" cy="32" r="5" fill="#F5C842"/>
          </svg>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:'white' }}>Kundalibaba</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', fontWeight:600, letterSpacing:'0.08em' }}>ADMIN PANEL</div>
          </div>
        </div>
      </div>
      {/* Nav */}
      <nav style={{ flex:1, padding:'12px 8px', overflow:'auto' }}>
        {/* Dashboard */}
        <NavItem id="dashboard" label="Dashboard" icon="📊" current={current} onNav={onNav} />
        {/* User Management group */}
        <div onClick={() => setUsersOpen(o => !o)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 14px', cursor:'pointer', borderRadius:8, marginBottom:2 }}>
          <span style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.35)', textTransform:'uppercase', letterSpacing:'0.1em' }}>User Management</span>
          <span style={{ color:'rgba(255,255,255,0.35)', fontSize:11 }}>{usersOpen ? '▲' : '▼'}</span>
        </div>
        {usersOpen && ['astrologers','customers','vendors'].map(id => {
          const n = NAV.find(x => x.id === id);
          return <NavItem key={id} id={id} label={n.label} icon={n.icon} current={current} onNav={onNav} indent />;
        })}
        <div style={{ height:1, background:'rgba(255,255,255,0.07)', margin:'8px 8px' }} />
        {['wallet','withdrawals','shop','cms','blogs','horoscopes'].map(id => {
          const n = NAV.find(x => x.id === id);
          return <NavItem key={id} id={id} label={n.label} icon={n.icon} current={current} onNav={onNav} />;
        })}
      </nav>
      {/* User */}
      <div style={{ padding:'14px 16px', borderTop:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
          <div style={{ width:32, height:32, borderRadius:'50%', background:`${C.saffron}33`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:C.saffron, flexShrink:0 }}>
            {(user?.name || 'A')[0].toUpperCase()}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.9)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user?.name || 'Admin'}</div>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{user?.email}</div>
          </div>
        </div>
        <button onClick={onLogout} style={{ width:'100%', padding:'7px 0', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, color:'rgba(255,255,255,0.6)', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>
          Sign Out
        </button>
      </div>
    </div>
  );
}

function NavItem({ id, label, icon, current, onNav, indent }) {
  const active = current === id;
  return (
    <div onClick={() => onNav(id)} style={{
      display:'flex', alignItems:'center', gap:10,
      padding: indent ? '7px 14px 7px 28px' : '8px 14px',
      borderRadius:8, cursor:'pointer', marginBottom:2,
      background: active ? `${C.saffron}22` : 'transparent',
      borderLeft: active ? `3px solid ${C.saffron}` : '3px solid transparent',
      transition:'all 150ms',
    }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background='rgba(255,255,255,0.05)'; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background='transparent'; }}
    >
      <span style={{ fontSize:15 }}>{icon}</span>
      <span style={{ fontSize:13, fontWeight: active ? 700 : 500, color: active ? C.saffron : 'rgba(255,255,255,0.65)', whiteSpace:'nowrap' }}>{label}</span>
    </div>
  );
}

// ── Login Page ─────────────────────────────────────────────────
function AdminLogin({ onLogin }) {
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [status, setStatus] = React.useState('loading');
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    window.__adminGoogleCb = async (response) => {
      setLoading(true); setError('');
      try {
        const res = await KBApi.googleLogin(response.credential);
        const user = res.data.user;
        if (!ADMIN_EMAILS.includes(user.email)) {
          Auth.clear();
          setError(`Access denied. Your account is not authorized to access the admin panel.`);
          setLoading(false);
          return;
        }
        Auth.setToken(res.data.accessToken);
        Auth.setRefresh(res.data.refreshToken);
        Auth.setUser(user);
        onLogin(user);
      } catch(e) {
        setError(e.message || 'Login failed. Please try again.');
        setLoading(false);
      }
    };
    let attempts = 0;
    const tryRender = () => {
      attempts++;
      if (containerRef.current && window.google?.accounts?.id) {
        try {
          window.google.accounts.id.initialize({ client_id:GOOGLE_CLIENT_ID, callback:window.__adminGoogleCb });
          window.google.accounts.id.renderButton(containerRef.current, { theme:'outline', size:'large', text:'signin_with', shape:'rectangular', width:320 });
          setStatus('ready');
        } catch { setStatus('error'); setError('Google Sign-In failed to load.'); }
      } else if (attempts < 40) {
        setTimeout(tryRender, 250);
      } else {
        setStatus('error'); setError('Google Sign-In could not load. Please refresh.');
      }
    };
    const t = setTimeout(tryRender, 400);
    return () => { clearTimeout(t); delete window.__adminGoogleCb; };
  }, []);

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#060D20,#0D1B3E)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
      <div style={{ background:'white', borderRadius:24, padding:48, width:'100%', maxWidth:420, boxShadow:'0 32px 80px rgba(0,0,0,0.3)', textAlign:'center' }}>
        <div style={{ marginBottom:32 }}>
          <div style={{ width:64, height:64, borderRadius:16, background:'rgba(232,137,12,0.12)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:32, margin:'0 auto 16px' }}>🔐</div>
          <h1 style={{ fontSize:24, fontWeight:800, color:'#111827', marginBottom:6 }}>Admin Panel</h1>
          <p style={{ fontSize:13, color:'#6b7280' }}>KundaliBaba — Restricted Access</p>
        </div>
        {loading && <div style={{ fontSize:14, color:C.saffron, marginBottom:16 }}>⏳ Verifying access...</div>}
        {error && <div style={{ fontSize:13, color:'#dc2626', background:'#fef2f2', border:'1px solid #fecaca', padding:'10px 14px', borderRadius:10, marginBottom:16 }}>{error}</div>}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:20 }}>
          {status === 'loading' && (
            <div style={{ width:320, height:44, border:'1px solid #e5e7eb', borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#9ca3af', marginBottom:0 }}>
              Loading Google Sign-In...
            </div>
          )}
          <div ref={containerRef} style={{ width:320, minHeight: status === 'loading' ? 0 : 44 }} />
        </div>
        <p style={{ fontSize:11, color:'#9ca3af' }}>Only authorized admin accounts can access this panel.</p>
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function AdminApp() {
  const stored = Auth.getUser();
  const isAdmin = ADMIN_EMAILS.includes(stored?.email);
  const [user, setUser] = React.useState(isAdmin ? stored : null);
  const [section, setSection] = React.useState('dashboard');

  const handleLogout = async () => {
    try { await KBApi.logout(Auth.getRefresh()); } catch {}
    Auth.clear();
    setUser(null);
  };

  if (!user) return <AdminLogin onLogin={setUser} />;

  const PAGES = { dashboard:<Dashboard />, astrologers:<Astrologers />, customers:<Customers />, vendors:<Vendors />, wallet:<WalletManagement />, withdrawals:<Withdrawals />, shop:<AstroShop />, cms:<CMS />, blogs:<Blogs />, horoscopes:<Horoscopes /> };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar current={section} onNav={setSection} user={user} onLogout={handleLogout} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {/* Top bar */}
        <div style={{ background:'white', borderBottom:'1px solid #f0f0f0', padding:'14px 28px', display:'flex', justifyContent:'space-between', alignItems:'center', position:'sticky', top:0, zIndex:100 }}>
          <div style={{ fontSize:13, color:'#6b7280' }}>
            <span style={{ color:C.saffron, fontWeight:600 }}>Admin</span> / {NAV.find(n => n.id === section)?.label || section}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <a href="/" target="_blank" style={{ fontSize:12, color:C.saffron, fontWeight:600, textDecoration:'none' }}>↗ View Site</a>
            <div style={{ fontSize:12, color:'#6b7280' }}>👤 {user.name || user.email}</div>
          </div>
        </div>
        {/* Content */}
        <div style={{ flex:1, padding:28, overflow:'auto' }}>
          {PAGES[section] || <Dashboard />}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AdminApp />);
  </script>
</body>
